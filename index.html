<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InvoiceGo" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>InvoiceGo</title>
  <style>:root { --accent: #4A7BF7; }</style>
  <script>try { var _a=localStorage.getItem('inv_accent_color'); if(_a) document.documentElement.style.setProperty('--accent',_a); } catch(e){}</script>
  <!-- Version check: runs before React. On mismatch, fires 'inv-version-update' event
       so React can show a user-friendly prompt instead of force-reloading. -->
  <script>
    (function () {
      var LOCAL = '5.9';
      fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.version && d.version !== LOCAL) {
            // React hasn't mounted yet — store the flag so useVersionCheck picks it up
            window.__inv_version_update_pending = true;
          }
        })
        .catch(function () {});
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
