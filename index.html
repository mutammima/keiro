<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover makes env(safe-area-inset-*) return real values so the
         app pads below the status bar / Dynamic Island. Required inside the native
         (Capacitor) wrapper, which draws edge-to-edge; a no-op on desktop web. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black" keeps a dark status bar that matches dark-mode; App.jsx JS updates
         theme-color dynamically so light mode also gets the correct bar colour. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Keiro" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Keiro</title>
    <meta name="description" content="The bridge for your next order — connecting drivers and stores in real time." />
    <!-- Open Graph -->
    <meta property="og:title" content="Keiro" />
    <meta property="og:description" content="The bridge for your next order — connecting drivers and stores in real time." />
    <meta property="og:site_name" content="Keiro" />
    <meta property="og:type" content="website" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Keiro" />
    <meta name="twitter:description" content="The bridge for your next order — connecting drivers and stores in real time." />
  <style>:root { --accent: #4A7BF7; }</style>
  <!-- External (not inline) so CSP can stay `script-src 'self'`. Blocking on
       purpose: the saved accent must apply before first paint. -->
  <script src="/accent-boot.js"></script>
  <!-- Version check handled entirely by useVersionCheck.js (React) which uses
       the build-time __APP_VERSION__ injected by vite.config.js. No inline
       version string needed here — it would go stale on every deploy anyway. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
